<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BNDS GPT · 十一学校AI助手</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <div class="app-container">
        <!-- 侧边栏 -->
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <button id="toggleSidebarBtn">☰</button>
                <button id="newChatBtn" class="new-chat-btn">+ 新建对话</button>
            </div>
            <ul id="conversationList" class="conversation-list">
                <!-- 由 JavaScript 动态渲染 -->
            </ul>
        </aside>
        
        <!-- 主聊天区域 -->
        <main class="chat-area">
            <div class="chat-header">
                <h1>BNDS ChatBot</h1>
                <span class="subtitle">开发版</span>
            </div>
            <div class="chat-messages" id="chatMessages">
                <div class="message bot">
                    <div class="avatar">🤖</div>
                    <div class="bubble">你好！我是BNDS GPT，有什么关于十一学校的问题可以问我 😊</div>
                </div>
                <div class="typing-indicator" id="typingIndicator">
                    <span>AI正在思考...</span>
                </div>
            </div>
            <div class="chat-input-area">
                <input type="text" id="userInput" placeholder="输入你的问题..." autofocus>
                <button id="sendBtn">发送</button>
            </div>
        </main>
    </div>

    <script src="{{ url_for('static', filename='js/script.js') }}"></script>
</body>
</html>
